{{- $root := . -}}
{{- range $component, $settings := .Values.components }}
{{- if $settings.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tnoc.fullname" $root }}-{{ $component }}
  labels:
    {{- include "tnoc.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ $settings.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tnoc.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tnoc.name" $root }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: {{ $component }}
      annotations:
        checksum/config: {{ toYaml $root.Values.env | sha256sum }}
    spec:
      serviceAccountName: {{ include "tnoc.fullname" $root }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $component }}
          image: {{ required "image.repository is required" $root.Values.image.repository }}:{{ required "image.tag is required" $root.Values.image.tag }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          command: [{{ $settings.command | quote }}]
          envFrom:
            - configMapRef: { name: {{ include "tnoc.fullname" $root }} }
            - secretRef: { name: {{ required "component secretRef or global secretRef is required" ($settings.secretRef | default $root.Values.secretRef) }} }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources: {{ toYaml $settings.resources | nindent 12 }}
          {{- if eq $component "api" }}
          ports:
            - { name: http, containerPort: {{ $root.Values.service.targetPort }} }
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
      nodeSelector: {{ toYaml $root.Values.nodeSelector | nindent 8 }}
      tolerations: {{ toYaml $root.Values.tolerations | nindent 8 }}
      affinity: {{ toYaml $root.Values.affinity | nindent 8 }}
{{- end }}
{{- end }}
