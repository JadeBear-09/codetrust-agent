name: tnoc-changeguard

x-backend: &backend
  build:
    context: .
  env_file: .env
  restart: unless-stopped
  depends_on:
    migrate:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8.0-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=kafka:9092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - kafka-data:/var/lib/redpanda/data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    volumes:
      - qdrant-data:/qdrant/storage

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  migrate:
    build:
      context: .
    env_file: .env
    command: ["tnoc-migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *backend
    command: ["tnoc-api"]
    ports:
      - "${API_PUBLISHED_PORT:?API_PUBLISHED_PORT is required}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    <<: *backend
    command: ["tnoc-worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  outbox:
    <<: *backend
    command: ["tnoc-outbox"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  qdrant-data:
