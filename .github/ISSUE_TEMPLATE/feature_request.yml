name: Feature request
description: Propose verification capability or product improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which verification gap or user workflow needs improvement?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should user receive?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence model
      description: Which deterministic or repository evidence would support result?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
