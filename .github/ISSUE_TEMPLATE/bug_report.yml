name: Bug report
description: Report reproducible CodeTrust failure
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Never include API keys, private repository content, or sensitive report data.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal safe steps or public PR reference.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CodeTrust version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, provider, and GitHub CLI version. Do not include credentials.
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Relevant error, finding ID, or redacted report excerpt.
